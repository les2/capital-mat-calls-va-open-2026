name: Refresh Virginia Open schedule

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: virginia-open-schedule
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-update.txt
      - run: pip install -r requirements-update.txt
      - name: Fetch and validate the official schedule
        run: python scripts/update_schedule.py
      - name: Commit a verified change
        run: |
          if git diff --quiet -- public/data/schedule.json; then
            echo "No schedule changes"
            exit 0
          fi
          git config user.name "capital-schedule-bot"
          git config user.email "capital-schedule-bot@users.noreply.github.com"
          git add public/data/schedule.json
          git commit -m "Update Virginia Open schedule"
          git push
